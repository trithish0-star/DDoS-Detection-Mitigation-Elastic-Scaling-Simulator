<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Stock - Stock Management</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <header>
      <h1>Edit Stock Item</h1>
      <p class="subtitle">Update item details</p>
    </header>

    <div class="form-container">
      <form method="POST" action="{{ url_for('edit', item_id=item.id) }}">
        <div class="form-group">
          <label for="name">Item Name</label>
          <input type="text" id="name" name="name" required value="{{ item.name }}">
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <input type="text" id="category" name="category" required value="{{ item.category }}" list="categories">
          <datalist id="categories">
            <option value="Electronics">
            <option value="Stationery">
            <option value="Furniture">
            <option value="Clothing">
            <option value="Food">
            <option value="Other">
          </datalist>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" name="quantity" required min="0" value="{{ item.quantity }}">
          </div>

          <div class="form-group">
            <label for="price">Price ($)</label>
            <input type="number" id="price" name="price" required min="0" step="0.01" value="{{ item.price }}">
          </div>
        </div>

        <div class="form-actions">
          <a href="/" class="btn btn-outline">Cancel</a>
          <button type="submit" class="btn btn-primary">Update Stock</button>
        </div>
      </form>
    </div>

    <footer>
      <p>Stock Management System &copy; 2026</p>
    </footer>
  </div>
</body>
</html>
