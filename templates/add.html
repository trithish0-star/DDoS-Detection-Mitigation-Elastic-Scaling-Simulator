<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Stock - Stock Management</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <header>
      <h1>Add New Stock</h1>
      <p class="subtitle">Add a new item to your inventory</p>
    </header>

    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <div class="form-container">
      <form method="POST" action="{{ url_for('add') }}">
        <div class="form-group">
          <label for="name">Item Name</label>
          <input type="text" id="name" name="name" required placeholder="e.g. Laptop, Mouse, Pen...">
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <input type="text" id="category" name="category" required placeholder="e.g. Electronics, Stationery..." list="categories">
          <datalist id="categories">
            <option value="Electronics">
            <option value="Stationery">
            <option value="Furniture">
            <option value="Clothing">
            <option value="Food">
            <option value="Other">
          </datalist>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" name="quantity" required min="1" placeholder="0">
          </div>

          <div class="form-group">
            <label for="price">Price ($)</label>
            <input type="number" id="price" name="price" required min="0" step="0.01" placeholder="0.00">
          </div>
        </div>

        <div class="form-actions">
          <a href="/" class="btn btn-outline">Cancel</a>
          <button type="submit" class="btn btn-primary">Add Stock</button>
        </div>
      </form>
    </div>

    <footer>
      <p>Stock Management System &copy; 2026</p>
    </footer>
  </div>
</body>
</html>
